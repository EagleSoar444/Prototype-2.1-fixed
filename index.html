<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>VT Tracer Prototype v2.2.1 ROOT FIXED</title>
<style>
:root{--bg:#0f1510;--deep:#0b0f0b;--panel:#1a211b;--panel2:#202920;--border:#394339;--orange:#ff7a1a;--olive:#556b2f;--tan:#f4f1e8;--muted:#b4b0a2;--red:#ff4d2e;--blue:#6ba8ff;--purple:#b48cff}
*{box-sizing:border-box}body{margin:0;font-family:Arial,system-ui,sans-serif;background:linear-gradient(135deg,#0f1510,#171d16);color:var(--tan);display:grid;grid-template-columns:280px 1fr;min-height:100vh}button,input,select,textarea{font:inherit}
.sidebar{background:#121712;border-right:1px solid var(--border);padding:20px;position:sticky;top:0;height:100vh;overflow:auto}.brand{display:flex;align-items:center;gap:12px;margin-bottom:24px}.logo{width:64px;height:64px;border-radius:18px;background:linear-gradient(135deg,var(--orange),#734115);display:grid;place-items:center;font-weight:900;font-size:26px;box-shadow:0 10px 24px rgba(0,0,0,.35)}.brand small{color:var(--muted)}
.nav button{width:100%;margin-bottom:10px;padding:13px;border-radius:14px;border:1px solid var(--border);background:var(--panel);color:var(--tan);text-align:left;cursor:pointer;font-weight:700}.nav button:hover,.nav button.active{background:rgba(255,122,26,.16);border-color:var(--orange)}
.main{padding:20px;overflow:auto}.hero{display:flex;justify-content:space-between;gap:18px;margin-bottom:18px;padding:22px;border:1px solid var(--border);border-radius:24px;background:linear-gradient(135deg,rgba(32,41,32,.98),rgba(18,23,18,.96));box-shadow:0 12px 30px rgba(0,0,0,.25)}.hero h1{margin:0 0 6px;font-size:clamp(32px,5vw,58px);line-height:.95}.hero p{color:var(--muted);margin:0;max-width:950px}.pill{align-self:center;border:1px solid var(--border);border-radius:18px;padding:13px;background:rgba(255,255,255,.04);color:var(--orange);font-weight:900}.dot{display:inline-block;width:11px;height:11px;border-radius:50%;background:var(--red);box-shadow:0 0 14px var(--red);margin-right:8px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px}.grid3{display:grid;grid-template-columns:300px 1fr 300px;gap:18px;margin-bottom:18px}.grid2{display:grid;grid-template-columns:1.15fr .85fr;gap:18px;margin-bottom:18px}.wide{display:grid;grid-template-columns:1.25fr .9fr .9fr;gap:18px;margin-bottom:18px}
.card,.metric{background:rgba(26,33,27,.95);border:1px solid var(--border);border-radius:22px;padding:18px;box-shadow:0 12px 30px rgba(0,0,0,.25)}.card h2{margin:0 0 14px;color:#d9c896}.card h3{color:var(--orange);margin:10px 0}.metric strong{display:block;font-size:30px;color:var(--orange)}.metric small,.muted{color:var(--muted)}
.row{padding:12px;margin-bottom:10px;border-radius:13px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07)}.rowTop{display:flex;justify-content:space-between;gap:10px}.badge{background:var(--orange);color:#15120d;border-radius:999px;padding:5px 10px;font-weight:900;border:0;cursor:pointer}.badge2{background:rgba(255,255,255,.06);color:var(--tan);border:1px solid var(--border);border-radius:999px;padding:5px 10px;cursor:pointer}
.feed .item,.event{padding:10px;margin-bottom:10px;border-radius:12px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);border-left:4px solid var(--olive)}.event.high{border-left-color:var(--orange)}.event.critical{border-left-color:var(--red)}.event.info{border-left-color:var(--blue)}.tags{display:flex;gap:6px;flex-wrap:wrap}.tags span{border:1px solid var(--border);border-radius:999px;color:#d9c896;padding:3px 8px;font-size:12px}
.chart{height:170px;border:1px solid var(--border);border-radius:16px;background:rgba(255,255,255,.035);display:flex;align-items:flex-end;gap:10px;padding:14px}.chart div{flex:1;background:linear-gradient(180deg,var(--orange),rgba(255,122,26,.22));border-radius:10px 10px 0 0;position:relative}.chart span{position:absolute;bottom:100%;left:50%;transform:translateX(-50%);font-size:11px;color:var(--muted)}
.line{height:180px;border:1px solid var(--border);border-radius:16px;background:linear-gradient(135deg,rgba(255,255,255,.035),rgba(255,122,26,.05));overflow:hidden}.line svg{width:100%;height:100%}.line text{fill:var(--muted);font-size:11px}
.map{height:330px;border-radius:18px;background:repeating-linear-gradient(45deg,rgba(255,255,255,.04) 0 1px,transparent 1px 18px),linear-gradient(135deg,rgba(85,107,47,.3),rgba(0,0,0,.2));border:1px solid var(--border);position:relative;overflow:hidden}.pin{position:absolute;transform:translate(-50%,-50%);border:1px solid var(--border);border-radius:999px;background:#0c0f0a;color:#d9c896;padding:7px 10px;font-size:12px;font-weight:800;white-space:nowrap}.hunterPin{background:rgba(107,168,255,.2);color:#d8e8ff}.sightPin{background:rgba(255,122,26,.22);color:#fff}.windCone{position:absolute;left:52%;top:40%;width:210px;height:150px;background:rgba(255,255,255,.06);clip-path:polygon(0 50%,100% 0,100% 100%);transform:rotate(20deg)}
input,select,textarea{width:100%;border:1px solid var(--border);background:rgba(0,0,0,.2);color:var(--tan);border-radius:12px;padding:10px;margin-bottom:10px}textarea{min-height:90px}table{width:100%;border-collapse:collapse}td,th{border-bottom:1px solid var(--border);padding:10px;text-align:left}th{color:#d9c896}
.tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px}.tabs button{border:1px solid var(--border);background:rgba(255,255,255,.04);color:var(--muted);border-radius:999px;padding:10px 14px;cursor:pointer}.tabs button.active{background:var(--orange);color:#15120d;border-color:var(--orange);font-weight:900}
.toggleGrid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}.toggleGrid label{border:1px solid var(--border);border-radius:12px;background:rgba(255,255,255,.035);padding:9px;display:flex;gap:7px;align-items:center}.toggleGrid input{width:auto;margin:0}
.scope{height:360px;border-radius:20px;position:relative;overflow:hidden;background:radial-gradient(circle at center,rgba(255,255,255,.08),transparent 30%),#161b15;border:1px solid var(--border);display:grid;place-items:center}.scopeCircle{position:absolute;width:300px;height:300px;border-radius:50%;border:3px solid rgba(255,255,255,.6);box-shadow:0 0 0 999px rgba(0,0,0,.22)}.crossH,.crossV{position:absolute;background:white;opacity:.8}.crossH{height:2px;width:100%;top:50%}.crossV{width:2px;height:100%;left:50%}.impact,.hold{position:absolute;width:24px;height:24px;border-radius:50%;transform:translate(-50%,-50%)}.impact{border:3px solid var(--red);left:58%;top:52%}.hold{border:3px solid white;left:50%;top:45%}.deer{position:absolute;width:240px;height:120px;background:linear-gradient(135deg,#8b6138,#4a311d);border-radius:45%;left:50%;top:54%;transform:translate(-50%,-50%)}.deer:before{content:"";position:absolute;right:-30px;top:-25px;width:70px;height:55px;border-radius:50%;background:#704a2a}
.gallery{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}.thumb{height:140px;border-radius:14px;background:linear-gradient(135deg,rgba(255,122,26,.25),rgba(85,107,47,.3));display:grid;place-items:center;font-weight:800}.hunterGrid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}.hunter{border:1px solid var(--border);border-radius:16px;background:rgba(255,255,255,.04);padding:12px}.avatar{width:54px;height:54px;border-radius:16px;background:linear-gradient(135deg,rgba(255,122,26,.28),rgba(85,107,47,.35));display:grid;place-items:center;color:#d9c896;font-size:22px;font-weight:950;margin-bottom:10px}
.footer{margin-top:18px;color:var(--muted);font-size:13px}.bottom{display:none}
@media(max-width:1100px){body{grid-template-columns:1fr}.sidebar{position:relative;height:auto}.bottom{display:grid;position:fixed;left:10px;right:10px;bottom:10px;grid-template-columns:repeat(5,1fr);background:#101510;border:1px solid var(--border);border-radius:22px;overflow:hidden;z-index:20}.bottom button{border:0;background:transparent;color:var(--muted);padding:10px 2px;font-size:12px}.bottom button.active{color:var(--orange);background:rgba(255,122,26,.1)}.main{padding-bottom:88px}}
@media(max-width:900px){.hero,.grid4,.grid3,.grid2,.wide,.gallery,.hunterGrid{grid-template-columns:1fr 1fr}.wide .mapCard{grid-column:span 2}}
@media(max-width:650px){.hero,.grid4,.grid3,.grid2,.wide,.gallery,.hunterGrid,.toggleGrid{grid-template-columns:1fr}.wide .mapCard{grid-column:auto}.hero{display:grid}.pill{align-self:start}}
</style>
</head>

<script>
(function(){
var page="command";var activeSub="command";
var activePrefs={map:true,weather:true,feed:true,comms:true,ballistics:true,dope:true,media:true,alerts:true,graphs:true};
var nav=[["command","Command Suite"],["hunt","Hunt Command Manager"],["active","Active Hunt View"],["hunter","Hunter Suite"],["intel","Intel & Collections"],["weather","Weather & Maps"],["comms","Communication"],["ballistics","Ballistic Suite"],["property","Property Suite"],["gallery","Media Vault"],["calendar","Calendar"],["reports","Reports"]];
var events=[["SPYPOINT Buck Alert","Split G2 detected near East Plot camera. Confidence 88%.","critical","6:42 AM","SPYPOINT · Target Buck"],["Command Cam Motion","Motion flagged at Creek Trail.","high","6:58 AM","Command Cam"],["Wind Shift Warning","Wind drifting toward lower access road.","high","7:02 AM","Weather"],["Live Sighting","Hunter 2 marked two does crossing Creek Trail.","info","7:11 AM","Sighting"],["Property Alert","Feeder refill is overdue.","high","8:04 AM","Property"]];
function esc(x){return String(x==null?"":x).replace(/[&<>"']/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;","'":"&#039;",'"':"&quot;"}[c]||c})}
function header(k,t,d){return '<section class="hero"><div><p class="muted">'+esc(k)+'</p><h1>'+esc(t)+'</h1><p>'+esc(d)+'</p></div><div class="pill"><span class="dot"></span>Live Prototype</div></section>'}
function metrics(items){return '<section class="grid4">'+items.map(function(x){return '<div class="metric"><strong>'+x[0]+'</strong>'+x[1]+'<br><small>'+x[2]+'</small></div>'}).join('')+'</section>'}
function feed(n){var arr=n?events.slice(0,n):events;return '<div class="card"><h2>Event Feed</h2>'+arr.map(function(e){return '<div class="event '+e[2]+'"><div class="rowTop"><strong>'+e[0]+'</strong><small class="muted">'+e[3]+'</small></div><p>'+e[1]+'</p><div class="tags"><span>'+e[4]+'</span></div></div>'}).join('')+'</div>'}
function chart(){return '<div class="chart"><div style="height:82%"><span>Buck</span></div><div style="height:62%"><span>Doe</span></div><div style="height:45%"><span>Turkey</span></div><div style="height:28%"><span>Pred</span></div><div style="height:74%"><span>Cam</span></div></div>'}
function line(){return '<div class="line"><svg viewBox="0 0 600 180" preserveAspectRatio="none"><polyline points="0,140 70,125 140,82 210,110 280,42 350,63 420,35 500,70 600,38" fill="none" stroke="#ff7a1a" stroke-width="5"/><polyline points="0,150 70,140 140,125 210,128 280,100 350,112 420,88 500,96 600,76" fill="none" stroke="#6ba8ff" stroke-width="3" stroke-dasharray="8 8"/><text x="20" y="25">Orange: target activity · Blue: total activity</text></svg></div>'}
function map(){return '<div class="map"><div class="windCone"></div><span class="pin hunterPin" style="left:23%;top:26%">Hunter 1 · North Box</span><span class="pin hunterPin" style="left:72%;top:30%">Hunter 2 · South Ladder</span><span class="pin sightPin" style="left:50%;top:56%">Live Sighting</span><span class="pin" style="left:68%;top:65%">SPYPOINT East</span><span class="pin" style="left:50%;top:38%">Command Creek</span></div>'}
function scope(){return '<div class="scope"><div class="scopeCircle"></div><div class="crossH"></div><div class="crossV"></div><div class="deer"></div><div class="impact"></div><div class="hold"></div></div>'}
function dope(){return '<table><tr><th>Range</th><th>Drop</th><th>MOA</th><th>MIL</th><th>Clicks</th></tr><tr><td>100</td><td>0</td><td>0</td><td>0</td><td>0</td></tr><tr><td>200</td><td>3.1 in</td><td>1.5</td><td>.44</td><td>6</td></tr><tr><td>250</td><td>7.4 in</td><td>2.8</td><td>.81</td><td>11</td></tr><tr><td>300</td><td>12.9 in</td><td>4.1</td><td>1.19</td><td>16</td></tr></table>'}
function command(){return header("Command Suite","Command Dashboard","Overall summaries, graphs, snapshots, feeds, alerts, leaderboards, hit list, active hunt status, and property signals.")+metrics([["4","Hunters Active","sharing location"],["12","Camera Alerts","last 24 hours"],["82","Top Hunt Score","North Box"],["6","Open Alerts","field + property"]])+'<section class="wide"><div class="card mapCard"><h2>Live Activity Map</h2>'+map()+'</div>'+feed(5)+'<div class="card"><h2>Snapshots & Alerts</h2><div class="row">Hit List: Split G2, Tall 8, Wide 10</div><div class="row">Leaderboard: Hunter 1 · 24 hunts</div><div class="row">Weather: E wind 6 mph · sunrise 6:18</div><div class="row">Property: feeder refill overdue</div></div></section><section class="grid2"><div class="card"><h2>Movement Graph</h2>'+line()+'</div><div class="card"><h2>Activity Breakdown</h2>'+chart()+'</div></section>'}
function activeHunt(){return header("Active Hunt View","Customizable In-Stand Command Window","Hunter can choose exactly which data, panels, views, and feeds are shown while hunting. Ballistics and shot placement remain accessible from the active view.")+'<section class="tabs"><button class="'+(activeSub==="command"?"active":"")+'" data-active="command">Active Command</button><button class="'+(activeSub==="customize"?"active":"")+'" data-active="customize">Customize View</button><button class="'+(activeSub==="ballistics"?"active":"")+'" data-active="ballistics">Shot Placement / DOPE</button></section>'+activeContent()}
function activeContent(){if(activeSub==="customize")return '<section class="grid2"><div class="card"><h2>Choose Active View Panels</h2><div class="toggleGrid">'+Object.keys(activePrefs).map(function(k){return '<label><input type="checkbox" '+(activePrefs[k]?'checked':'')+' data-pref="'+k+'"> '+k.charAt(0).toUpperCase()+k.slice(1)+'</label>'}).join('')+'</div></div><div class="card"><h2>Display Modes</h2><div class="row">Minimal: map, weather, emergency</div><div class="row">Ballistic: shot placement + DOPE dominant</div><div class="row">Comms: chat and hunter location dominant</div><div class="row">Full Command: all panels visible</div></div></section>';if(activeSub==="ballistics")return '<section class="grid2"><div class="card"><h2>Shot Placement View</h2>'+scope()+'<p class="muted">White reticle = hold · Red reticle = desired impact</p></div><div class="card"><h2>Active Hunt DOPE Card</h2>'+dope()+'<br><div class="row">Rifle: .308 Deer Rifle · 165gr · 100yd zero</div><div class="row">Weather-linked wind: E 6 mph · Gust 11</div><div class="row">Distance slider and deer-angle selector placeholder</div></div></section>';var panels=[];if(activePrefs.map)panels.push('<div class="card mapCard"><h2>Live Map</h2>'+map()+'</div>');if(activePrefs.weather)panels.push('<div class="card"><h2>Weather / Wind</h2><div class="row">44°F · East wind 6 mph · gust 11</div><div class="row">Sunrise 6:18 AM · Sunset 5:42 PM</div><div class="row">Moon: Waning · Pressure rising</div></div>');if(activePrefs.feed)panels.push(feed(4));if(activePrefs.ballistics)panels.push('<div class="card"><h2>Ballistic Quick View</h2>'+scope()+'</div>');if(activePrefs.dope)panels.push('<div class="card"><h2>DOPE Card</h2>'+dope()+'</div>');if(activePrefs.comms)panels.push('<div class="card"><h2>Comms</h2><div class="row">Hunter 2: does crossing creek.</div><input placeholder="Message active hunters"><button class="badge">Send</button></div>');if(activePrefs.media)panels.push('<div class="card"><h2>Media / Stream</h2><div class="row">SPYPOINT photo alert preview</div><div class="row">Live stream placeholder</div><div class="row">Sports/news optional panel</div></div>');if(activePrefs.alerts)panels.push('<div class="card"><h2>Emergency / Alerts</h2><button class="badge">Request Help</button> <button class="badge2">Share Location</button><div class="row">Low battery · North Creek Cam</div></div>');if(activePrefs.graphs)panels.push('<div class="card"><h2>Live Activity Graph</h2>'+line()+'</div>');return '<section class="wide">'+panels.join('')+'</section>'}
function hunt(){return header("Hunt Command Manager","Plan → Active → Completed","Save plans, activate them into current hunts, complete them into season and hunter records.")+'<section class="grid2"><div class="card"><h2>Plan Hunt</h2><select><option>Target: Split G2</option></select><select><option>Recommended Stand: North Box</option></select><textarea placeholder="Ask AI to build the hunt plan"></textarea><button class="badge">Save Hunt Plan</button></div><div class="card"><h2>Workflow</h2><div class="row">1. Plan</div><div class="row">2. Save / Recall</div><div class="row">3. Activate Current Hunt</div><div class="row">4. Complete & Journal</div></div></section><section class="grid2"><div class="card"><h2>Hunt Intel</h2>'+line()+'</div><div class="card"><h2>Stand Scores</h2><div class="row">North Box · 82 · Best wind</div><div class="row">East Plot · 71 · Evening watch</div><div class="row">South Ladder · 64 · Backup</div></div></section>'}
function hunter(){return header("Hunter Suite","Profiles, Preferences, Galleries, Journals","Individual hunter profiles, goals, stats, equipment, ballistic profiles, and personal media.")+metrics([["24","Hunts","Hunter 1"],["5","Harvests","recorded"],["12","Gear","saved"],["9","Profiles","deer/gear"]])+'<section class="grid2"><div class="card"><h2>Hunter Profile</h2><div class="row">Preferred Species: Whitetail Buck</div><div class="row">Preferred Wind: E/NE</div><div class="row">Preferred Stand: North Box</div><div class="row">Max Verified Range: Ballistic Suite</div></div><div class="card"><h2>Gallery Preview</h2><div class="gallery"><div class="thumb">Profile</div><div class="thumb">Harvest</div><div class="thumb">Scouting</div><div class="thumb">Gear</div></div></div></section>'}
function intel(){return header("Intel & Collections","Data, Predictions, Identification, Labeling","Camera events, sightings, AI labels, deer profiles, movement charts, and suggestions.")+'<section class="grid2"><div class="card"><h2>Movement Prediction</h2>'+line()+'</div><div class="card"><h2>Species Activity</h2>'+chart()+'</div></section><section class="grid2">'+feed(4)+'<div class="card"><h2>AI Labels</h2><div class="row">Split G2 · Target · 88%</div><div class="row">Tall 8 · Watchlist · 72%</div><div class="row">Unknown Buck · Review</div></div></section>'}
function weather(){return header("Weather & Maps","Interactive Map, Weather, Wind, Stands","Map layers, wind cones, weather overlays, ideal stand setup, property boundary, sightings, and cameras.")+'<section class="grid2"><div class="card"><h2>Property Map</h2>'+map()+'</div><div class="card"><h2>Weather Conditions</h2><div class="row">Temperature: 44°F</div><div class="row">Wind: East 6 mph · gust 11</div><div class="row">Pressure: Rising</div><div class="row">Moon: Waning</div><div class="row">Stand fit: North Box ideal</div></div></section>'}
function comms(){return header("Communication Suite","Chat, Streams, Map Pins, Alerts","Communicate and coordinate with active hunters.")+'<section class="grid3"><div class="card"><h2>Channels</h2><div class="row">Main Camp</div><div class="row">Active Hunt</div><div class="row">Camera Intel</div></div>'+feed(4)+'<div class="card"><h2>Actions</h2><button class="badge2">Share Photo</button><br><br><button class="badge2">Share Map Pin</button><br><br><button class="badge2">Start Stream</button><br><br><button class="badge">Emergency</button></div></section>'}
function ballistics(){return header("Ballistic Suite","Shot Placement, Reticle Holds, DOPE Cards","Expanded ballistic suite with the same shot placement view also available inside Active Hunt View.")+'<section class="grid2"><div class="card"><h2>Shot Placement View</h2>'+scope()+'</div><div class="card"><h2>DOPE Card</h2>'+dope()+'<br><div class="row">Rifle profile, deer angle, distance, wind and reticle data.</div></div></section><section class="grid2"><div class="card"><h2>Trajectory</h2>'+line()+'</div><div class="card"><h2>Profiles</h2><div class="row">.308 Deer Rifle</div><div class="row">6.5 Creedmoor</div><div class="row">Custom Load</div></div></section>'}
function property(){return header("Property Suite","Equipment, Inventory, Timber, Stands, Food Plots, Tasks","Full property operations management.")+'<section class="grid2"><div class="card"><h2>Operations Board</h2><table><tr><th>Task</th><th>Category</th><th>Status</th></tr><tr><td>Camera battery</td><td>Camera</td><td>Open</td></tr><tr><td>Clover mowing</td><td>Food Plot</td><td>Complete</td></tr><tr><td>Stand straps</td><td>Stand</td><td>Inspect</td></tr></table></div><div class="card"><h2>Management Areas</h2><div class="row">Equipment</div><div class="row">Inventory</div><div class="row">Timber Operations</div><div class="row">Food Plots</div><div class="row">Documents & Contacts</div></div></section>'}
function gallery(){return header("Media Vault","Master Gallery and Hunter Galleries","Shared master gallery, individual hunter galleries, trail camera photos, property images, and completed hunt media.")+'<section class="grid2"><div class="card"><h2>Master Gallery</h2><div class="gallery"><div class="thumb">Target Buck</div><div class="thumb">Trail Cam</div><div class="thumb">Food Plot</div><div class="thumb">Harvest</div></div></div><div class="card"><h2>Upload / Share</h2><input placeholder="Photo title"><select><option>Master Gallery</option><option>Hunter 1 Gallery</option><option>Active Hunt</option></select><textarea placeholder="Notes"></textarea><button class="badge">Save Photo</button></div></section>'}
function calendar(){return header("Calendar","Master and Hunter Calendars","Schedule hunts, maintenance, camera checks, equipment service, and food plot work.")+'<section class="grid2"><div class="card"><h2>Upcoming</h2><div class="row">Morning Rut Hunt · Monday</div><div class="row">Camera Check · Wednesday</div><div class="row">Food Plot Work · Saturday</div></div><div class="card"><h2>Add Event</h2><input placeholder="Event title"><input placeholder="Date/time"><button class="badge">Add Event</button></div></section>'}
function reports(){return header("Reports","Analytics and Recommendations","Completed hunts, season activity, app sync model, and next build steps.")+'<section class="grid2"><div class="card"><h2>Season Activity</h2>'+line()+'</div><div class="card"><h2>Recommendations</h2><div class="row">Convert to React/Vite components</div><div class="row">Add persistent storage</div><div class="row">Add map/weather APIs</div><div class="row">Add real camera ingestion</div></div></section>'}
function content(){if(page==="hunt")return hunt();if(page==="active")return activeHunt();if(page==="hunter")return hunter();if(page==="intel")return intel();if(page==="weather")return weather();if(page==="comms")return comms();if(page==="ballistics")return ballistics();if(page==="property")return property();if(page==="gallery")return gallery();if(page==="calendar")return calendar();if(page==="reports")return reports();return command()}
function renderNav(){document.getElementById("nav").innerHTML=nav.map(function(n){return '<button class="'+(page===n[0]?'active':'')+'" data-page="'+n[0]+'">'+n[1]+'</button>'}).join('');document.getElementById("bottom").innerHTML=nav.slice(0,5).map(function(n){return '<button class="'+(page===n[0]?'active':'')+'" data-page="'+n[0]+'">'+n[1].split(" ")[0]+'</button>'}).join('')}
function bind(){document.querySelectorAll("[data-page]").forEach(function(b){b.addEventListener("click",function(){page=b.getAttribute("data-page");render();window.scrollTo(0,0)})});document.querySelectorAll("[data-active]").forEach(function(b){b.addEventListener("click",function(){activeSub=b.getAttribute("data-active");render();window.scrollTo(0,0)})});document.querySelectorAll("[data-pref]").forEach(function(i){i.addEventListener("change",function(){activePrefs[i.getAttribute("data-pref")]=i.checked;render()})})}
function render(){
  var fb=document.getElementById("fallbackLoad");
  if(fb){fb.remove();}
  renderNav();
  document.getElementById("main").innerHTML=content();
  bind();
}
render();
})();
</script>
</body>
</html>
